<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员面板 - 无障碍出行伴侣</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
    <div class="admin-header">
        <h1>🚧 障碍物管理后台</h1>
        <a href="index.html" class="btn-back">← 返回用户端</a>
    </div>

    <!-- 统计卡片 -->
    <div class="stats-cards">
        <div class="card">
            <h3>总上报</h3>
            <div id="totalCount">0</div>
        </div>
        <div class="card">
            <h3>待处理</h3>
            <div id="pendingCount">0</div>
        </div>
        <div class="card">
            <h3>已处理</h3>
            <div id="resolvedCount">0</div>
        </div>
        <div class="card">
            <h3>处理中</h3>
            <div id="processingCount">0</div>
        </div>
    </div>

    <!-- 图表区域 -->
    <div class="charts-container">
        <div id="typeChart" style="height:250px;"></div>
        <div id="trendChartAdmin" style="height:250px;"></div>
    </div>

    <!-- 搜索/筛选栏 -->
    <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="搜索类型或描述...">
        <select id="statusFilter">
            <option value="all">全部状态</option>
            <option value="未处理">未处理</option>
            <option value="处理中">处理中</option>
            <option value="已处理">已处理</option>
        </select>
        <button id="exportReportBtn" class="btn-secondary">📄 导出周报</button>
        <button id="refreshBtn" class="btn-primary">🔄 刷新</button>
    </div>

    <!-- 障碍物表格 -->
    <div id="obstacleTable" class="table-container"></div>

    <!-- 照片查看模态框 -->
    <div id="photoModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closePhotoModal">&times;</span>
            <img id="modalPhoto" src="" alt="障碍物照片" style="max-width:100%;">
        </div>
    </div>

    <script src="mockData.js"></script>
    <script src="admin.js"></script>
</body>
</html>
